name: Self Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  shell-syntax:
    name: Shell Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Check shell syntax
        run: |
          bash -n scripts/gha-sandbox-probe.sh
          bash -n actions/docker-sandbox/run.sh
          bash -n tests/expect-failure.sh

      - name: Refuses host-specific environment forwarding
        run: |
          tests/expect-failure.sh env \
            INPUT_IMAGE=ubuntu:24.04 \
            INPUT_COMMAND=true \
            INPUT_INHERIT_ENV=PATH \
            actions/docker-sandbox/run.sh

          tests/expect-failure.sh env \
            INPUT_IMAGE=ubuntu:24.04 \
            INPUT_COMMAND=true \
            INPUT_ENV=HOME=/tmp/other-home \
            actions/docker-sandbox/run.sh

          tests/expect-failure.sh env \
            INPUT_IMAGE=ubuntu:24.04 \
            INPUT_COMMAND=true \
            INPUT_ENV=GITHUB_TOKEN=dummy \
            actions/docker-sandbox/run.sh

      - name: Refuses unknown disabled check names
        run: |
          tests/expect-failure.sh docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --env GHA_SANDBOX_DISABLE_CHECKS=linux-proc \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

  probe-script:
    name: Probe Script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Passes in a hardened container
        run: |
          docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Image entrypoint does not run before probes
        run: |
          tmp_image_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_image_dir"' EXIT
          cat > "$tmp_image_dir/Dockerfile" <<'EOF'
          FROM ubuntu:24.04
          ENTRYPOINT ["bash", "-lc", "echo entrypoint-ran >/entrypoint-ran; exec \"$@\"", "--"]
          EOF
          docker build -t gha-sandbox-entrypoint-test "$tmp_image_dir"

          env \
            INPUT_IMAGE=gha-sandbox-entrypoint-test \
            INPUT_COMMAND='test ! -e /entrypoint-ran' \
            INPUT_INHERIT_ENV=none \
            actions/docker-sandbox/run.sh

      - name: Fails when capabilities are present
        run: |
          tests/expect-failure.sh docker run --rm \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Allows disabling capability check by risk acceptance
        run: |
          docker run --rm \
            --env GHA_SANDBOX_DISABLE_CHECKS=zero-capabilities \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Fails when Docker socket is visible
        run: |
          tests/expect-failure.sh docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Cannot disable container runtime socket check
        run: |
          tests/expect-failure.sh docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --env GHA_SANDBOX_DISABLE_CHECKS=all-risk-accepted \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Fails when container runtime socket is visible
        run: |
          tests/expect-failure.sh docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            --volume /var/run/docker.sock:/run/containerd/containerd.sock \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Fails when Actions runtime credentials are visible
        run: |
          tests/expect-failure.sh docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --env ACTIONS_RUNTIME_TOKEN=dummy \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Fails when URL credentials are visible
        run: |
          tests/expect-failure.sh docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --env REGISTRY_URL=https://user:password@example.com \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Allows disabling environment check by risk acceptance
        run: |
          docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --network none \
            --env ACTIONS_RUNTIME_TOKEN=dummy \
            --env REGISTRY_URL=https://user:password@example.com \
            --env GHA_SANDBOX_DISABLE_CHECKS=environment \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Allows explicitly accepted environment risk
        run: |
          docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --network none \
            --env ACTIONS_RUNTIME_TOKEN=dummy \
            --env REGISTRY_URL=https://user:password@example.com \
            --env GHA_SANDBOX_ALLOWED_ENV_NAMES=ACTIONS_RUNTIME_TOKEN,REGISTRY_URL \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Fails when cloud credential files are visible
        run: |
          tmp_home="$(mktemp -d)"
          trap 'rm -rf "$tmp_home"' EXIT
          mkdir -p "$tmp_home/.aws"
          cat > "$tmp_home/.aws/credentials" <<'EOF'
          [default]
          aws_access_key_id=AKIAEXAMPLE
          aws_secret_access_key=secret
          EOF
          chmod -R a+rX "$tmp_home"

          tests/expect-failure.sh docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --env HOME=/tmp/home \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            --volume "$tmp_home:/tmp/home:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Allows disabling credential file check by risk acceptance
        run: |
          tmp_home="$(mktemp -d)"
          trap 'rm -rf "$tmp_home"' EXIT
          mkdir -p "$tmp_home/.aws"
          cat > "$tmp_home/.aws/credentials" <<'EOF'
          [default]
          aws_access_key_id=AKIAEXAMPLE
          aws_secret_access_key=secret
          EOF
          chmod -R a+rX "$tmp_home"

          docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --pids-limit 128 \
            --network none \
            --env HOME=/tmp/home \
            --env GHA_SANDBOX_DISABLE_CHECKS=credential-files \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            --volume "$tmp_home:/tmp/home:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Fails when Kubernetes service account token is visible
        run: |
          tmp_service_account="$(mktemp -d)"
          trap 'rm -rf "$tmp_service_account"' EXIT
          printf 'token' > "$tmp_service_account/token"
          chmod -R a+rX "$tmp_service_account"

          tests/expect-failure.sh docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            --volume "$tmp_service_account:/var/run/secrets/kubernetes.io/serviceaccount:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Fails when host PID namespace is visible
        run: |
          bash -c 'sleep 120' Runner.Worker-sentinel &
          sentinel_pid="$!"
          trap 'kill "$sentinel_pid" 2>/dev/null || true' EXIT

          tests/expect-failure.sh docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --pid=host \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:ro" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

      - name: Fails when workspace is writable
        run: |
          tests/expect-failure.sh docker run --rm \
            --user 1001 \
            --cap-drop=ALL \
            --security-opt no-new-privileges \
            --volume "$PWD/scripts:/probe-scripts:ro" \
            --volume "$PWD:/workspace:rw" \
            ubuntu:24.04 \
            bash /probe-scripts/gha-sandbox-probe.sh

  action:
    name: Composite Action
    runs-on: ubuntu-latest
    env:
      FORCE_COLOR: "1"
      INHERITED_TEST_VALUE: inherited
      TERM: xterm-256color
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Run local action
        uses: ./
        with:
          image: ubuntu:24.04
          env: |
            USER_TEST_VALUE=explicit
            FAKE_TOKEN=dummy
            REGISTRY_URL=https://user:password@example.com
          unsafe-env: |
            GITHUB_TOKEN=dummy
          inherit-env: |
            INHERITED_TEST_VALUE
          command: |
            test -f README.md
            test -f LICENSE
            test ! -e .git
            test "$USER_TEST_VALUE" = explicit
            test "$FAKE_TOKEN" = dummy
            test "$REGISTRY_URL" = https://user:password@example.com
            test "$GITHUB_TOKEN" = dummy
            test "$INHERITED_TEST_VALUE" = inherited
            test "$FORCE_COLOR" = 1
            test "$TERM" = xterm-256color

      - name: Run nested action entrypoint
        uses: ./actions/docker-sandbox
        with:
          image: ubuntu:24.04
          disable-checks: |
            environment
          unsafe-env: |
            GITHUB_TOKEN=dummy
          command: |
            test -f README.md
            test ! -e .git
            test "$GITHUB_TOKEN" = dummy
