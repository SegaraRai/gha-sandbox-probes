name: Docker Sandbox Probes
description: Run sandbox escape probes and then execute a command in a hardened Docker container.
inputs:
  image:
    description: Docker image used for the sandbox.
    required: true
  command:
    description: Command to run after the probes pass.
    required: true
  workspace:
    description: Host path mounted read-only at /workspace.
    required: false
    default: ""
  user:
    description: Container user.
    required: false
    default: "1001"
  pids-limit:
    description: Docker process limit.
    required: false
    default: "512"
  network:
    description: Docker network mode. Defaults to none; use bridge only when the sandboxed command needs outbound network.
    required: false
    default: none
  env:
    description: Newline-separated KEY=value entries passed to the sandbox command.
    required: false
    default: ""
  unsafe-env:
    description: Newline-separated KEY=value entries for sensitive CI environment variables that are intentionally exposed to the sandbox command.
    required: false
    default: ""
  inherit-env:
    description: Newline, comma, or space separated variable names inherited from the caller environment. Use auto for the curated non-sensitive default set, or none to disable it.
    required: false
    default: auto
  unsafe-inherit-env:
    description: Newline, comma, or space separated sensitive CI environment variable names intentionally inherited into the sandbox command.
    required: false
    default: ""
  disable-checks:
    description: Comma, space, or newline separated probe checks to disable after explicit risk acceptance.
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Run sandbox probes
      shell: bash
      env:
        INPUT_IMAGE: ${{ inputs.image }}
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_WORKSPACE: ${{ inputs.workspace }}
        INPUT_USER: ${{ inputs.user }}
        INPUT_PIDS_LIMIT: ${{ inputs.pids-limit }}
        INPUT_NETWORK: ${{ inputs.network }}
        INPUT_ENV: ${{ inputs.env }}
        INPUT_UNSAFE_ENV: ${{ inputs.unsafe-env }}
        INPUT_INHERIT_ENV: ${{ inputs.inherit-env }}
        INPUT_UNSAFE_INHERIT_ENV: ${{ inputs.unsafe-inherit-env }}
        INPUT_DISABLE_CHECKS: ${{ inputs.disable-checks }}
      run: '"$GITHUB_ACTION_PATH/run.sh"'
